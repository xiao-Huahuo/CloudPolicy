              $ref: '#/components/schemas/EmailCodeSendRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodeDispatchResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /auth/email/bind:
    post:
      tags:
      - auth
      summary: Bind Email
      operationId: bind_email_auth_email_bind_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindEmailRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /auth/phone/bind:
    post:
      tags:
      - auth
      summary: Bind Phone
      operationId: bind_phone_auth_phone_bind_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BindPhoneRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /user/:
    post:
      tags:
      - user
      summary: Create User
      description: '创建新用户

        :param user:

        :param session:

        :return:'
      operationId: create_user_user__post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegisterResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /user/verify-email:
    post:
      tags:
      - user
      summary: Verify Email
      operationId: verify_email_user_verify_email_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /user/verify-email-link:
    get:
      tags:
      - user
      summary: Verify Email Link
      operationId: verify_email_link_user_verify_email_link_get
      parameters:
      - name: token
        in: query
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            text/html:
              schema:
                type: string
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /user/resend-verification:
    post:
      tags:
      - user
      summary: Resend Verification Email
      operationId: resend_verification_email_user_resend_verification_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationResendRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /user/me:
    get:
      tags:
      - user
      summary: Get User
      description: '获取当前登录用户的个人信息

        :param current_user:

        :return:'
      operationId: get_user_user_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
      security:
      - OAuth2PasswordBearer: []
    patch:
      tags:
      - user
      summary: Update User
      description: '更新当前登录用户的个人信息

        :param user_in: 更新的用户信息

        :param session:

        :param current_user:

        :return:'
      operationId: update_user_user_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /user/request-upgrade:
    post:
      tags:
      - user
      summary: Request Permission Upgrade
      description: 普通用户申请升级为认证主体，认证主体申请升级为管理员（向所有管理员发送通知）
      operationId: request_permission_upgrade_user_request_upgrade_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /user/request-downgrade:
    post:
      tags:
      - user
      summary: Request Permission Downgrade
      description: 认证主体或管理员申请降级为普通用户
      operationId: request_permission_downgrade_user_request_downgrade_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /login/:
    post:
      tags:
      - login
      summary: Login Access Token
      operationId: login_access_token_login__post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_login_access_token_login__post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Token'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/:
    post:
      tags:
      - chat_message
      summary: Create Chat Message
      operationId: create_chat_message_chat__post
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: parse_task_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Parse Task Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageCreate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - chat_message
      summary: Read Chat Messages
      operationId: read_chat_messages_chat__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: id
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Id
      - name: original_text
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Original Text
      - name: target_audience
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Target Audience
      - name: handling_matter
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Handling Matter
      - name: time_deadline
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Time Deadline
      - name: location_entrance
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Location Entrance
      - name: required_materials
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Required Materials
      - name: handling_process
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Handling Process
      - name: precautions
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Precautions
      - name: risk_warnings
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Risk Warnings
      - name: original_text_mapping
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Original Text Mapping
      - name: skip
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Skip
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          default: 100
          title: Limit
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
          default: created_time
          title: Sort By
      - name: sort_order
        in: query
        required: false
        schema:
          type: string
          default: desc
          title: Sort Order
      - name: handling_only
        in: query
        required: false
        schema:
          type: boolean
          default: false
          title: Handling Only
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessageRead'
                title: Response Read Chat Messages Chat  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/progress/start:
    post:
      tags:
      - chat_message
      summary: Start Chat Progress Task
      operationId: start_chat_progress_task_chat_progress_start_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
      security:
      - OAuth2PasswordBearer: []
  /chat/progress/stream:
    get:
      tags:
      - chat_message
      summary: Stream Chat Progress
      operationId: stream_chat_progress_chat_progress_stream_get
      parameters:
      - name: task_id
        in: query
        required: true
        schema:
          type: string
          title: Task Id
      - name: token
        in: query
        required: true
        schema:
          type: string
          title: Token
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/import:
    post:
      tags:
      - chat_message
      summary: Import Chat Message
      operationId: import_chat_message_chat_import_post
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Body_import_chat_message_chat_import_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /chat/{message_id}:
    get:
      tags:
      - chat_message
      summary: Read Chat Message
      operationId: read_chat_message_chat__message_id__get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - chat_message
      summary: Update Chat Message Audience
      operationId: update_chat_message_audience_chat__message_id__patch
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatMessageUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatMessageRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - chat_message
      summary: Delete Chat Message
      operationId: delete_chat_message_chat__message_id__delete
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/{message_id}/export:
    get:
      tags:
      - chat_message
      summary: Export Chat Message
      operationId: export_chat_message_chat__message_id__export_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/{message_id}/open-folder:
    get:
      tags:
      - chat_message
      summary: Open Chat Message Folder
      operationId: open_chat_message_folder_chat__message_id__open_folder_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/{message_id}/rag-context:
    get:
      tags:
      - chat_message
      summary: Get Chat Message Rag Context
      operationId: get_chat_message_rag_context_chat__message_id__rag_context_get
      security:
      - OAuth2PasswordBearer: []
      parameters:
      - name: message_id
        in: path
        required: true
        schema:
          type: integer
          title: Message Id
      - name: top_k
        in: query
        required: false
        schema:
          type: integer
          maximum: 10
          minimum: 1
          default: 5
          title: Top K
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /chat/batch-delete:
    post:
      tags:
      - chat_message
      summary: Delete Chat Messages
      operationId: delete_chat_messages_chat_batch_delete_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Body_delete_chat_messages_chat_batch_delete_post'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
      security:
      - OAuth2PasswordBearer: []
  /analysis/me:
    get:
      tags:
      - analysis
      summary: Get My Stats
      description: '获取当前登录用户的所有通知解析统计数据。

        该接口底层使用了自研的纯算法（分词）进行高频词统计。'
      operationId: get_my_stats_analysis_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsAnalysisRead'
      security:
      - OAuth2PasswordBearer: []
  /settings/me:
    get:
      tags:
      - settings
      summary: Get My Settings
      description: 获取当前用户的设置。如果不存在，则创建一个默认设置并返回。
      operationId: get_my_settings_settings_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SettingsRead'
      security:
      - OAuth2PasswordBearer: []
    patch:
      tags:
      - settings
      summary: Update My Settings
      description: 更新当前用户的设置。
      operationId: update_my_settings_settings_me_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsUpdate'
        required: true
      responses:
