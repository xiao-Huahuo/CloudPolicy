version: '3.8'

services:
  redis:
    image: redis:latest
    container_name: ClearNotify_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  app:
    build: ./app
    container_name: ClearNotify_app
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DEBUG: ${DEBUG}
      HOST: ${HOST}
      PORT: ${PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PHONE: ${ADMIN_PHONE}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      EMAIL_VERIFICATION_CODE_LENGTH: ${EMAIL_VERIFICATION_CODE_LENGTH}
      EMAIL_VERIFICATION_EXPIRE_MINUTES: ${EMAIL_VERIFICATION_EXPIRE_MINUTES}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB_CACHE: ${REDIS_DB_CACHE}
      REDIS_DB_QUEUE: ${REDIS_DB_QUEUE}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME}
      CRAWLER_RATE_LIMIT: ${CRAWLER_RATE_LIMIT}
      CRAWLER_RATE_WINDOW_SECONDS: ${CRAWLER_RATE_WINDOW_SECONDS}
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY}
    volumes:
      - ./app/app:/app/app
      - ./database.db:/app/database.db
    depends_on:
      - redis
    restart: always

  web:
    build: ./web
    container_name: ClearNotify_web
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always

volumes:
  redis_data:
