services:
  redis:
    image: redis:latest
    container_name: CloudPolicy_Redis_Service
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  app:
    build:
      context: .
      dockerfile: ./app/Dockerfile
    working_dir: /server
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
    container_name: CloudPolicy_Service
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DOCKER_DEPLOYMENT: true
      DEBUG: false
      HOST: 0.0.0.0
      PORT: ${PORT}
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: ${ALGORITHM}
      ACCESS_TOKEN_EXPIRE_DAYS: ${ACCESS_TOKEN_EXPIRE_DAYS}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PHONE: ${ADMIN_PHONE}
      REALTIME_STREAM_INTERVAL_SECONDS: ${REALTIME_STREAM_INTERVAL_SECONDS}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_SENDER: ${SMTP_SENDER}
      SMTP_SENDER_NAME: ${SMTP_SENDER_NAME}
      SMTP_USE_SSL: ${SMTP_USE_SSL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
      EMAIL_VERIFICATION_CODE_LENGTH: ${EMAIL_VERIFICATION_CODE_LENGTH}
      EMAIL_VERIFICATION_EXPIRE_MINUTES: ${EMAIL_VERIFICATION_EXPIRE_MINUTES}
      PUBLIC_BASE_URL: http://10.133.130.115:8080 # 部署环境写本机局域网IP, 生产环境这个必须是真实域名/公网IP
      FRONTEND_BASE_URL: http://10.133.130.115:5173 # 部署环境写本机局域网IP
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB_CACHE: ${REDIS_DB_CACHE}
      REDIS_DB_QUEUE: ${REDIS_DB_QUEUE}
      REDIS_QUEUE_NAME: ${REDIS_QUEUE_NAME}
      CRAWLER_RATE_LIMIT: ${CRAWLER_RATE_LIMIT}
      CRAWLER_RATE_WINDOW_SECONDS: ${CRAWLER_RATE_WINDOW_SECONDS}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_TIMEOUT: ${LLM_TIMEOUT}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      AGENT_PLUGIN_ENABLED: ${AGENT_PLUGIN_ENABLED}
      AGENT_PLUGIN_EMBEDDING_MODEL: ${AGENT_PLUGIN_EMBEDDING_MODEL}
      AGENT_PLUGIN_COLLECTION_NAME: ${AGENT_PLUGIN_COLLECTION_NAME}
      AGENT_PLUGIN_RAG_CHUNK_SIZE: ${AGENT_PLUGIN_RAG_CHUNK_SIZE}
      AGENT_PLUGIN_RAG_METADATA_EXTRAS: ${AGENT_PLUGIN_RAG_METADATA_EXTRAS}
      AGENT_PLUGIN_RAG_FORCE_UPDATE: ${AGENT_PLUGIN_RAG_FORCE_UPDATE}
      AGENT_PLUGIN_RAG_TOP_K: ${AGENT_PLUGIN_RAG_TOP_K}
      AGENT_PLUGIN_RAG_SCORE_THRESHOLD: ${AGENT_PLUGIN_RAG_SCORE_THRESHOLD}
      AGENT_PLUGIN_SYSTEM_PROMPT: ${AGENT_PLUGIN_SYSTEM_PROMPT}
    volumes:
      - ./app:/server/app/
      - ./database.db:/server/database.db
      - ./uploads:/server/uploads
      - ./.env:/server/.env
      - ./logs:/server/logs
      - ./mail_outbox:/server/mail_outbox
    depends_on:
      - redis
    restart: always

  web:
    build: ./web
    container_name: CloudPolicy_Web
    ports:
      - "80:80"
    depends_on:
      - app
    restart: always
    volumes:
      - ./web:/app
      - /app/node_modules      # 关键：不要让宿主机的 node_modules 覆盖容器内的
volumes:
  redis_data:
